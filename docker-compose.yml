# Single compose file with profiles:
#   Production (server / CI):  docker compose --profile prod up -d --build
#   Local dev (db + pgAdmin):  docker compose --profile dev  up -d
services:
  # ---- Production app (server) ----
  app:
    profiles: ["prod"]
    build: .
    image: aiaa-backend:latest
    container_name: aiaa-app
    restart: unless-stopped
    env_file: .env
    # Bind to localhost only — host nginx is the public entrypoint.
    ports:
      - "127.0.0.1:8000:8000"

  # ---- Local dev database ----
  db:
    profiles: ["dev"]
    image: postgres:16-alpine
    container_name: aiaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiaa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-aiaa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiaa} -d ${POSTGRES_DB:-aiaa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Local dev pgAdmin ----
  pgadmin:
    profiles: ["dev"]
    image: dpage/pgadmin4:latest
    container_name: aiaa-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ai-academy.asia}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  pgdata:
  pgadmin_data:
