[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, bugbear, simplify, pyupgrade, comprehensions,
# return, misc lint.
select = ["E", "W", "F", "I", "B", "SIM", "UP", "C4", "RET", "PIE"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
